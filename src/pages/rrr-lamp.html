<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>3-DOF RRR Occlusion-Avoidance Lamp — JINX Simulator</title>
  <meta name="description"
    content="3-DOF RRR robotic desk lamp: IK, Jacobian analysis, occlusion-avoidance simulation.">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>

<body>
  <div class="layout">

    <!-- Header -->
    <div class="hbar">
      <a href="/" class="back-btn">← Home</a>
      <div>
        <div class="htitle">3-DOF RRR Occlusion-Avoidance Lamp<span class="badge">3D Simulator</span></div>
        <div class="hsub">Closed-form IK · Analytical Jacobian · Occlusion Avoidance · DH Convention</div>
      </div>
    </div>

    <div class="body-row">

      <!-- 3D Canvas (now takes full width) -->
      <div id="cw">
        <div class="hud" id="hud">
          <div><b>θ₁</b> <span id="h1">—</span>&ensp;<b>θ₂</b> <span id="h2">—</span>&ensp;<b>θ₃</b> <span
              id="h3">—</span></div>
          <div><b>Head</b> <span id="hHead">—</span></div>
          <div><b>μ (manip)</b> <span id="hMu">—</span></div>
          <div><b>Status</b> <span id="hStat" class="ok">—</span></div>
        </div>
        <!-- Camera POV mini viewport -->
        <div id="camPov"></div>
        <div class="pov-label">Camera POV</div>
        <div class="cam-hint">Drag to orbit · Scroll to zoom · Right-drag to pan</div>

        <!-- ═══ Minimal Control Bar ═══ -->
        <div class="sim-control-bar" id="simControlBar">
          <button class="sim-btn sim-btn-primary" id="sbtn">▶ Run Simulation</button>
          <button class="sim-btn sim-btn-secondary" id="btn-math-panel">📐 Open Math Panel</button>
          <button class="sim-btn sim-btn-ghost" id="resetBtn">⟲ Reset</button>
        </div>

        <!-- ═══ Link Detail Card (hidden by default) ═══ -->
        <div class="link-card" id="linkCard">
          <div class="link-card-header">
            <span class="link-card-icon">🔗</span>
            <span class="link-card-title" id="linkCardTitle">Link</span>
            <button class="link-card-close" id="linkCardClose">✕</button>
          </div>
          <div class="link-card-body">
            <div class="link-card-readout">
              <span class="link-card-label">Length</span>
              <span class="link-card-value" id="linkCardValue">0.000 m</span>
            </div>
            <input type="range" class="link-card-slider" id="linkCardSlider" min="0.05" max="0.50" value="0.30" step="0.005">
            <div class="link-card-range">
              <span id="linkCardMin">0.05</span>
              <span class="link-card-default" id="linkCardDefault">default: 0.30 m</span>
              <span id="linkCardMax">0.50</span>
            </div>
            <button class="link-card-reset" id="linkCardReset">⟲ Reset to Default</button>
          </div>
        </div>

      </div>

    </div>
  </div>

  <!-- Hidden elements needed by UIController (preserved to avoid null refs) -->
  <div style="display:none">
    <input type="range" id="xd" min="-0.15" max="0.85" value="0.28" step="0.01">
    <input type="range" id="yd" min="-0.30" max="0.30" value="0.14" step="0.01">
    <input type="range" id="jxd" min="-0.15" max="0.85" value="0.28" step="0.01">
    <input type="range" id="jyd" min="-0.30" max="0.30" value="0.14" step="0.01">
    <select id="elbow"><option value="1">Elbow-up (+)</option></select>
    <input type="range" id="dx" min="-0.2" max="0.1" value="-0.04" step="0.01">
    <input type="range" id="dy" min="-0.2" max="0.2" value="0.0" step="0.01">
    <input type="range" id="dz" min="0.20" max="0.55" value="0.45" step="0.01">
    <input type="range" id="spd" min="0.2" max="4" value="1" step="0.1">
    <input type="range" id="hR" min="0.03" max="0.18" value="0.08" step="0.01">
    <input type="range" id="vmax" min="0.3" max="3.0" value="1.2" step="0.1">
    <input type="range" id="amax" min="0.5" max="6.0" value="2.0" step="0.25">
    <input type="range" id="cfx" value="525"><input type="range" id="cfy" value="525">
    <input type="range" id="ccx" value="320"><input type="range" id="ccy" value="240">
    <input type="range" id="cu" value="320"><input type="range" id="cv_" value="240">
    <input type="range" id="czw" value="0.65">
    <input type="range" id="ctx" value="0.0"><input type="range" id="cty" value="0.50">
    <input type="range" id="ctz" value="0.30">
    <span id="xdv"></span><span id="ydv"></span><span id="jxdv"></span><span id="jydv"></span>
    <span id="dxv"></span><span id="dyv"></span><span id="dzv"></span>
    <span id="spdv"></span><span id="hRv"></span><span id="vmaxv"></span><span id="amaxv"></span>
    <span id="cfxv"></span><span id="cfyv"></span><span id="ccxv"></span><span id="ccyv"></span>
    <span id="cuv"></span><span id="cvv"></span><span id="czwv"></span>
    <span id="ctxv"></span><span id="ctyv"></span><span id="ctzv"></span>
    <span id="ik-t1"></span><span id="ik-t2"></span><span id="ik-t3"></span>
    <span id="ik-err"></span><span id="ik-r"></span><span id="ik-z"></span><span id="ik-mu"></span>
    <span id="ox"></span><span id="oy"></span><span id="oz"></span><span id="or_"></span>
    <span id="j11"></span><span id="j12"></span><span id="j13"></span>
    <span id="j21"></span><span id="j22"></span><span id="j23"></span>
    <span id="j31"></span><span id="j32"></span><span id="j33"></span>
    <span id="detJ"></span><span id="jmu"></span><span id="sinT3"></span><span id="jreach"></span>
    <span id="simF"></span><span id="simE"></span><span id="simT2"></span><span id="simMu"></span>
    <span id="simPhase"></span><span id="simS"></span><span id="simSdot"></span><span id="simSddot"></span>
    <span id="trapLabel"></span><span id="muLabel"></span>
    <span id="camXw"></span><span id="camYw"></span><span id="camZw"></span>
    <span id="camRx"></span><span id="camRy"></span><span id="camRz"></span><span id="camIK"></span>
    <div id="muBar"></div>
    <div id="ikAlert"></div><div id="limAlert"></div><div id="singWarn"></div><div id="singWarn2"></div>
    <div id="camAlert"></div><div id="simStats"></div>
    <canvas id="trapCvs"></canvas><canvas id="trajCvs"></canvas>
    <button id="camApplyBtn"></button>
    <div id="tabBar"></div>
    <div id="pane-ik"></div><div id="pane-jac"></div><div id="pane-sim"></div><div id="pane-cam"></div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
