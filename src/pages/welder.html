<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>6-DOF Welding Robot — JINX Simulator</title>
  <meta name="description"
    content="6-DOF Anthropomorphic Welding Robot: DLS IK, Jacobian analysis, automated weld seam tracing.">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>

<body>
  <div class="layout">

      <!-- Header -->
      <div class="hbar">
        <a href="../../index.html" class="back-btn">← Home</a>
        <div>
        <div class="htitle">6-DOF Welding Robot<span class="badge">3D Simulator</span></div>
        <div class="hsub">Damped Least-Squares IK · 6×N Jacobian · Automated Weld Seam · N-DOF Engine</div>
      </div>
    </div>

    <div class="body-row">

      <!-- 3D Canvas (now takes full width) -->
      <div id="cw">
        <div class="hud" id="hud">
          <div><b>θ₁</b> <span id="hud-q1">—</span>&ensp;<b>θ₂</b> <span id="hud-q2">—</span>&ensp;<b>θ₃</b> <span
              id="hud-q3">—</span></div>
          <div><b>θ₄</b> <span id="hud-q4">—</span>&ensp;<b>θ₅</b> <span id="hud-q5">—</span>&ensp;<b>θ₆</b> <span
              id="hud-q6">—</span></div>
          <div><b>EE</b> <span id="hHead">—</span></div>
          <div><b>Status</b> <span id="hStat" class="ok">—</span></div>
        </div>
        <div class="cam-hint">Drag to orbit · Scroll to zoom · Right-drag to pan</div>

        <!-- ═══ Minimal Control Bar ═══ -->
        <div class="sim-control-bar" id="simControlBar">
          <button class="sim-btn sim-btn-primary" id="btn-weld">▶ Start Welding</button>
          <button class="sim-btn sim-btn-secondary" id="btn-math-panel">📐 Open Math Panel</button>
          <button class="sim-btn sim-btn-ghost" id="btn-waypoints">📍 Waypoints</button>
          <button class="sim-btn sim-btn-ghost" id="btn-reset">⟲ Reset</button>
        </div>

        <!-- ═══ Link Detail Card (hidden by default) ═══ -->
        <div class="link-card" id="linkCard">
          <div class="link-card-header">
            <span class="link-card-icon">🔗</span>
            <span class="link-card-title" id="linkCardTitle">Link</span>
            <button class="link-card-close" id="linkCardClose">✕</button>
          </div>
          <div class="link-card-body">
            <div class="link-card-readout">
              <span class="link-card-label">Length</span>
              <span class="link-card-value" id="linkCardValue">0.000 m</span>
            </div>
            <input type="range" class="link-card-slider" id="linkCardSlider" min="0.05" max="0.50" value="0.30" step="0.005">
            <div class="link-card-range">
              <span id="linkCardMin">0.05</span>
              <span class="link-card-default" id="linkCardDefault">default: 0.30 m</span>
              <span id="linkCardMax">0.50</span>
            </div>
            <button class="link-card-reset" id="linkCardReset">⟲ Reset to Default</button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Hidden elements needed by WelderUIController (preserved to avoid null refs) -->
  <div style="display:none">
    <div id="tabBar"></div>
    <div id="pane-fk"></div><div id="pane-jac"></div><div id="pane-sim"></div><div id="pane-tasks"></div>
    <input type="range" id="t1" value="0"><input type="range" id="t2" value="0">
    <input type="range" id="t3" value="0"><input type="range" id="t4" value="0">
    <input type="range" id="t5" value="0"><input type="range" id="t6" value="0">
    <span id="val-t1"></span><span id="val-t2"></span><span id="val-t3"></span>
    <span id="val-t4"></span><span id="val-t5"></span><span id="val-t6"></span>
    <span id="val-x"></span><span id="val-y"></span><span id="val-z"></span>
    <div id="jac-grid"></div>
    <span id="val-det"></span><span id="val-mu"></span><div id="singularity-warn"></div>
    <span id="val-task-state">IDLE</span><span id="val-task-prog">0%</span>
    <span id="val-task-tgt">[0.00, 0.00, 0.00]</span>
    <div id="taskBar" style="width:0%"></div><span id="taskBarLabel"></span>
  </div>

  <script type="module" src="/src/welder-main.js"></script>
</body>

</html>
